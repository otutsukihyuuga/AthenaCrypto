<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crypto Markets</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg-sec: #f7f8fa;
        --bg-hov: #f0f2f7;
        --border: #e2e6ee;
        --text: #0b0f1a;
        --text2: #6b7585;
        --accent: #5865f2;
        --green: #16a34a;
        --gbg: #dcfce7;
        --red: #dc2626;
        --rbg: #fee2e2;
        --r: 12px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        color: var(--text);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f1117; --bg-sec: #1a1d27; --bg-hov: #222638;
          --border: #2a2f42; --text: #e8eaf0; --text2: #7a8099;
          --accent: #7c85ff; --green: #22c55e; --gbg: #052e16;
          --red: #f87171; --rbg: #2d0a0a;
        }
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; background: var(--bg); }
      body { padding: 12px; }
      #app { max-width: 780px; margin: 0 auto; }

      /* Header */
      #hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
      .hdr-l { display: flex; align-items: center; gap: 8px; }
      #dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 2px var(--gbg); animation: pulse 2s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
      h2 { font-size: 1rem; font-weight: 700; }
      #ts { font-size: .72rem; color: var(--text2); }

      /* Controls */
      #ctrl { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
      #sw { flex: 1; min-width: 150px; position: relative; }
      #sw svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text2); pointer-events: none; }
      #search {
        width: 100%; padding: 7px 10px 7px 30px; border: 1px solid var(--border);
        border-radius: 8px; background: var(--bg-sec); color: var(--text);
        font-size: .83rem; outline: none; transition: border-color .15s;
      }
      #search:focus { border-color: var(--accent); }
      #search::placeholder { color: var(--text2); }

      .grp {
        display: flex; border: 1px solid var(--border); border-radius: 8px;
        overflow: hidden; background: var(--bg-sec);
      }
      .grp button {
        padding: 6px 12px; border: none; background: transparent;
        color: var(--text2); font-size: .8rem; font-weight: 600;
        cursor: pointer; transition: background .12s, color .12s; white-space: nowrap;
      }
      .grp button:not(:last-child) { border-right: 1px solid var(--border); }
      .grp button.on { background: var(--accent); color: #fff; }
      .grp button:not(.on):hover { background: var(--bg-hov); color: var(--text); }

      /* Table */
      #tc { position: relative; }
      #tw {
        border: 1px solid var(--border); border-radius: var(--r);
        overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.06); overflow-x: auto;
      }
      table { width: 100%; border-collapse: collapse; min-width: 500px; }
      thead tr { background: var(--bg-sec); border-bottom: 1px solid var(--border); }
      th {
        padding: 8px 12px; text-align: left; font-size: .72rem; font-weight: 600;
        color: var(--text2); text-transform: uppercase; letter-spacing: .04em;
        white-space: nowrap; user-select: none;
      }
      th.s { cursor: pointer; }
      th.s:hover { color: var(--text); }
      th.sa { color: var(--accent); }
      .a { display: inline-block; margin-left: 3px; font-size: .7rem; }
      th:nth-child(n+3) { text-align: right; }
      tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
      tbody tr:last-child { border-bottom: none; }
      tbody tr:hover { background: var(--bg-hov); }
      td { padding: 8px 12px; vertical-align: middle; white-space: nowrap; }
      td:nth-child(n+3) { text-align: right; }

      .rk { color: var(--text2); font-size: .78rem; font-weight: 500; min-width: 22px; display: inline-block; text-align: right; }
      .cc { display: flex; align-items: center; gap: 8px; min-width: 140px; }
      .ci { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--bg-sec); }
      .cf { width: 26px; height: 26px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: .6rem; font-weight: 800; color: #fff; flex-shrink: 0; }
      .cn { font-weight: 600; font-size: .875rem; }
      .cs { font-size: .7rem; color: var(--text2); font-weight: 500; }
      .pr { font-weight: 600; font-size: .875rem; font-variant-numeric: tabular-nums; }
      .mc, .vl { font-size: .8rem; color: var(--text2); font-variant-numeric: tabular-nums; }

      .b {
        display: inline-flex; align-items: center; gap: 2px;
        padding: 2px 7px; border-radius: 5px;
        font-size: .75rem; font-weight: 700; font-variant-numeric: tabular-nums;
      }
      .b.p { background: var(--gbg); color: var(--green); }
      .b.n { background: var(--rbg); color: var(--red); }
      .b.z { background: var(--bg-sec); color: var(--text2); }

      #lo { display: none; position: absolute; inset: 0; background: rgba(15,17,23,.4); align-items: center; justify-content: center; border-radius: var(--r); backdrop-filter: blur(3px); }
      #lo.on { display: flex; }
      .sp { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,.2); border-top-color: var(--accent); border-radius: 50%; animation: spin .65s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      #em { display: none; padding: 28px; text-align: center; color: var(--text2); font-size: .875rem; }
      #em.on { display: block; }

      #ft { margin-top: 8px; display: flex; align-items: center; justify-content: space-between; font-size: .7rem; color: var(--text2); }
      #ft a { color: var(--text2); text-decoration: none; }
      #ft a:hover { color: var(--accent); }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="hdr">
        <div class="hdr-l">
          <span id="dot"></span>
          <h2>🪙 Crypto Markets</h2>
        </div>
        <span id="ts"></span>
      </div>

      <div id="ctrl">
        <!-- Interaction 1: Live search / filter -->
        <div id="sw">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search" placeholder="Search name or symbol…" autocomplete="off" />
        </div>

        <!-- Interaction 2: Change timeframe shown (1H / 24H) -->
        <div class="grp" id="tf-grp">
          <button class="tf" data-tf="1h">1H</button>
          <button class="tf on" data-tf="24h">24H</button>
        </div>

        <!-- Interaction 3: Top N selector (calls MCP tool) -->
        <div class="grp" id="lim-grp">
          <button class="lm" data-lim="10">Top 10</button>
          <button class="lm on" data-lim="25">Top 25</button>
          <button class="lm" data-lim="50">Top 50</button>
        </div>
      </div>

      <div id="tc">
        <div id="tw">
          <table>
            <thead>
              <tr>
                <th style="width:36px">#</th>
                <th>Coin</th>
                <th class="s sa" data-sort="price" id="th-price">Price (USD) <span class="a" id="a-price">↓</span></th>
                <th class="s" data-sort="marketCap" id="th-marketCap">Market Cap <span class="a" id="a-marketCap"></span></th>
                <th class="s" data-sort="volume" id="th-volume">Volume 24H <span class="a" id="a-volume"></span></th>
                <th class="s" data-sort="change" id="th-change">Change <span class="a" id="a-change"></span></th>
              </tr>
            </thead>
            <tbody id="tb"></tbody>
          </table>
          <div id="em">No coins match your search.</div>
        </div>
        <div id="lo"><div class="sp"></div></div>
      </div>

      <div id="ft">
        <span id="cnt"></span>
        <span>Data: <a href="https://www.cryptocompare.com" target="_blank">CryptoCompare</a></span>
      </div>
    </div>

    <script type="module">
      const S = {
        coins: [], search: "", sortBy: "marketCap", sortDir: "desc",
        tf: "24h", limit: 25, loading: false,
      };

      // ── Bootstrap ────────────────────────────────────────────────────────
      const init = window.openai?.toolOutput;
      if (init) { apply(init); } else { loadDirect(25); }

      window.addEventListener("openai:set_globals", (e) => {
        const td = e.detail?.globals?.toolOutput;
        if (td) { apply(td); S.loading = false; render(); }
      });

      function apply(data) {
        if (Array.isArray(data.coins)) S.coins = data.coins;
        setTs(data.lastUpdated);
        render();
      }

      // ── Fallback (no Athena host) ─────────────────────────────────────────
      async function loadDirect(limit) {
        S.loading = true; render();
        try {
          const fetchLim = Math.min(limit * 3, 150);
          const r = await fetch(`https://min-api.cryptocompare.com/data/top/mktcapfull?limit=${fetchLim}&tsym=USD`);
          const j = await r.json();
          const valid = (j.Data ?? []).filter(d => d?.RAW?.USD?.PRICE > 0 && d?.CoinInfo?.Name);
          S.coins = valid.slice(0, limit).map((d, i) => normCC(d, i + 1));
          setTs(new Date().toISOString());
        } catch (e) { console.error(e); }
        S.loading = false; render();
      }

      function normCC(d, fb) {
        const info = d.CoinInfo ?? {}, raw = d.RAW?.USD ?? {};
        return {
          id: (info.Name ?? "").toLowerCase(),
          rank: raw.MKTCAPRANK ?? fb,
          name: info.FullName ?? info.Name ?? "?",
          symbol: (info.Name ?? "").toUpperCase(),
          price: raw.PRICE ?? null,
          marketCap: raw.MKTCAP ?? null,
          volume: raw.TOTALVOLUME24H ?? null,
          change1h: raw.CHANGEPCTHOUR ?? null,
          change24h: raw.CHANGEPCT24HOUR ?? null,
          image: info.ImageUrl ? `https://www.cryptocompare.com${info.ImageUrl}` : null,
        };
      }

      // ── MCP tool calls ───────────────────────────────────────────────────
      async function callMarkets(limit) {
        S.loading = true; S.limit = limit; render();
        if (window.openai?.callTool) {
          try {
            const r = await window.openai.callTool("get_crypto_markets", { limit });
            if (r?.structuredContent) apply(r.structuredContent);
          } catch (e) { console.error(e); }
        } else { await loadDirect(limit); }
        S.loading = false; render();
      }

      // ── UI events ────────────────────────────────────────────────────────

      // Interaction 1: Search (instant client-side filter)
      document.getElementById("search").addEventListener("input", e => {
        S.search = e.target.value.trim().toLowerCase(); render();
      });

      // Interaction 2: Timeframe toggle (client-side column switch)
      document.querySelectorAll(".tf").forEach(btn => {
        btn.addEventListener("click", () => {
          if (btn.dataset.tf === S.tf) return;
          document.querySelectorAll(".tf").forEach(b => b.classList.remove("on"));
          btn.classList.add("on");
          S.tf = btn.dataset.tf;
          // Also re-sort by the active change column
          if (S.sortBy === "change") render();
          else render();
        });
      });

      // Interaction 3: Top N selector (calls MCP tool)
      document.querySelectorAll(".lm").forEach(btn => {
        btn.addEventListener("click", () => {
          const lim = parseInt(btn.dataset.lim, 10);
          if (lim === S.limit) return;
          document.querySelectorAll(".lm").forEach(b => b.classList.remove("on"));
          btn.classList.add("on");
          callMarkets(lim);
        });
      });

      // Sort by column
      document.querySelectorAll("th.s").forEach(th => {
        th.addEventListener("click", () => {
          const col = th.dataset.sort;
          S.sortBy === col ? (S.sortDir = S.sortDir === "desc" ? "asc" : "desc") : (S.sortBy = col, S.sortDir = "desc");
          updSortUI(); render();
        });
      });

      // ── Render ───────────────────────────────────────────────────────────
      function render() {
        document.getElementById("lo").classList.toggle("on", S.loading);

        // Update change column header label
        document.getElementById("th-change").childNodes[0].textContent =
          S.tf === "1h" ? "1H Change " : "24H Change ";

        let coins = [...S.coins];
        if (S.search) {
          coins = coins.filter(c =>
            (c.name ?? "").toLowerCase().includes(S.search) ||
            (c.symbol ?? "").toLowerCase().includes(S.search)
          );
        }

        const chKey = S.tf === "1h" ? "change1h" : "change24h";
        const sortKey = S.sortBy === "change" ? chKey : S.sortBy;
        coins.sort((a, b) => {
          const av = a[sortKey] ?? 0, bv = b[sortKey] ?? 0;
          return S.sortDir === "desc" ? bv - av : av - bv;
        });

        const tb = document.getElementById("tb");
        const em = document.getElementById("em");
        document.getElementById("cnt").textContent = S.loading ? "" : `${coins.length} coin${coins.length !== 1 ? "s" : ""}`;

        if (!coins.length && !S.loading) { tb.innerHTML = ""; em.classList.add("on"); return; }
        em.classList.remove("on");
        tb.innerHTML = coins.map(c => row(c, chKey)).join("");

        tb.querySelectorAll("img.ci").forEach(img => {
          img.addEventListener("error", () => {
            const fb = document.createElement("div");
            fb.className = "cf"; fb.textContent = img.dataset.s?.slice(0, 2) ?? "?";
            img.replaceWith(fb);
          }, { once: true });
        });

        updSortUI();
      }

      function row(c, chKey) {
        const pf = c.price != null
          ? "$" + c.price.toLocaleString("en-US", { maximumFractionDigits: c.price >= 1000 ? 2 : c.price >= 1 ? 4 : 6, minimumFractionDigits: 2 })
          : "—";
        const ch = c[chKey];
        const chF = ch != null ? `${ch >= 0 ? "+" : ""}${ch.toFixed(2)}%` : "—";
        const cls = ch == null ? "z" : ch >= 0 ? "p" : "n";
        const ar  = ch == null ? "" : ch >= 0 ? "▲" : "▼";
        const img = c.image
          ? `<img class="ci" src="${esc(c.image)}" alt="${esc(c.symbol)}" data-s="${esc(c.symbol)}" loading="lazy" />`
          : `<div class="cf">${esc((c.symbol ?? "??").slice(0, 2))}</div>`;

        return `<tr>
          <td><span class="rk">${c.rank ?? "—"}</span></td>
          <td><div class="cc">${img}<div><div class="cn">${esc(c.name)}</div><div class="cs">${esc(c.symbol)}</div></div></div></td>
          <td><span class="pr">${pf}</span></td>
          <td><span class="mc">$${cpt(c.marketCap)}</span></td>
          <td><span class="vl">$${cpt(c.volume)}</span></td>
          <td><span class="b ${cls}">${ar} ${chF}</span></td>
        </tr>`;
      }

      function updSortUI() {
        ["price","marketCap","volume","change"].forEach(col => {
          const th = document.getElementById(`th-${col}`);
          const a  = document.getElementById(`a-${col}`);
          if (!th || !a) return;
          if (S.sortBy === col) { th.classList.add("sa"); a.textContent = S.sortDir === "desc" ? "↓" : "↑"; }
          else { th.classList.remove("sa"); a.textContent = ""; }
        });
      }

      function cpt(n) {
        if (n == null) return "—";
        if (n >= 1e12) return (n / 1e12).toFixed(2) + "T";
        if (n >= 1e9)  return (n / 1e9).toFixed(2) + "B";
        if (n >= 1e6)  return (n / 1e6).toFixed(2) + "M";
        if (n >= 1e3)  return (n / 1e3).toFixed(1) + "K";
        return n.toFixed(2);
      }

      function esc(s) {
        return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
      }

      function setTs(iso) {
        const el = document.getElementById("ts");
        if (!iso || !el) return;
        try { el.textContent = `Updated ${new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`; } catch {}
      }

      render();
    </script>
  </body>
</html>
